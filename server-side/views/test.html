<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Oroya - Agence de Communication</title>
    <style>
      :root {
        --text-color: #000;
        --font-main: "Didot", "Playfair Display", serif;
        --font-sans: "Helvetica Neue", Arial, sans-serif;
      }

      body,
      html {
        margin: 0;
        padding: 0;
        font-family: var(--font-sans);
        color: var(--text-color);
        background-color: #fff;
        overflow-x: hidden;
      }

      /* --- Header / Navigation --- */
      header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 40px 80px;
      }

      .logo h1 {
        font-family: var(--font-main);
        font-size: 2.5rem;
        letter-spacing: 4px;
        margin: 0;
        text-transform: uppercase;
      }

      .logo p {
        font-size: 0.7rem;
        letter-spacing: 2px;
        margin: 0;
        text-transform: uppercase;
      }

      nav ul {
        list-style: none;
        display: flex;
        gap: 30px;
      }

      nav a {
        text-decoration: none;
        color: var(--text-color);
        font-size: 0.85rem;
        font-weight: 500;
      }

      /* --- Hero Section --- */
      .hero {
        text-align: center;
        padding-top: 60px;
        position: relative;
      }

      .hero h2 {
        font-family: var(--font-main);
        font-size: 4rem;
        margin: 0;
        font-weight: 400;
        line-height: 1.1;
      }

      .hero h2 span {
        font-weight: 700;
        text-transform: uppercase;
      }

      .hero-subtext {
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 15px;
        margin-top: 20px;
        font-size: 0.9rem;
        max-width: 400px;
        margin-left: auto;
        margin-right: auto;
        text-align: left;
      }

      /* --- Floating Elements --- */
      .cta-circle {
        position: absolute;
        left: 10%;
        top: 50%;
        width: 120px;
        height: 120px;
        border: 1px solid #000;
        border-radius: 50%;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        font-size: 0.7rem;
        text-align: center;
        padding: 10px;
        cursor: pointer;
      }

      .social-links {
        position: absolute;
        right: 80px;
        top: 50%;
        display: flex;
        flex-direction: column;
        gap: 15px;
        font-size: 1.2rem;
      }

      /* --- Bottom Image Wave Section --- */
      .bottom-section {
        position: relative;
        margin-top: 100px;
        width: 100%;
        height: 450px;
        /* Using a placeholder for the wavy image */
        background: url("https://images.unsplash.com/photo-1618005182384-a83a8bd57fbe?auto=format&fit=crop&q=80&w=2000")
          center/cover no-repeat;
        clip-path: ellipse(100% 100% at 50% 100%);
      }

      .cactus-icon {
        position: absolute;
        top: -40px;
        right: 35%;
        font-size: 3rem;
      }
      .post-feild {
        position: absolute;
        left: 40%;
        top: 70%;
        z-index: 10;
        margin-top: 50px;
        display: flex;
        flex-direction: column;
        gap: 15px;
      }
      .post-feild input {
        padding: 10px;
        font-size: 1rem;
        border: 1px solid #ccc;
        border-radius: 4px;
      }
      .post-feild button {
        padding: 10px;
        font-size: 1rem;
        border: none;
        border-radius: 4px;
        background-color: #000;
        color: #fff;
        cursor: pointer;
      }
      #label {
        text-align: left;
        font-size: 2rem;
      }
    </style>
  </head>
  <body>
    <header>
      <div class="logo">
        <h1>OROYA</h1>
        <p>Agence de Communication</p>
      </div>
      <nav>
        <ul>
          <li><a href="#" style="border-bottom: 2px solid #000">Accueil</a></li>
          <li><a href="#">À propos</a></li>
          <li><a href="#">Nos prestations</a></li>
          <li><a href="#">Nos réalisations</a></li>
          <li><a href="#">Contact</a></li>
        </ul>
      </nav>
    </header>

    <main class="hero">
      <div class="cta-circle">
        DÉCOUVREZ <br />
        NOS PRESTATIONS <br />
        ↓
      </div>

      <h2>
        <b>AGENCE</b> de COMMUNICATION <br />
        <i>CRÉATIVE</i> & <b>HUMAINE</b>
      </h2>

      <div class="hero-subtext">
        <span>👁️‍🗨️</span>
        <p>Agence de marketing, communication et développement à Tours</p>
      </div>

      <div class="social-links">
        <span>f</span>
        <span>in</span>
        <span>o</span>
      </div>

      <div class="bottom-section">
        <div class="cactus-icon">🌵</div>
      </div>
      <form class="post-feild" action="/posts" method="post">
        <label id="label" for="post-title">Post Title:</label>
        <input
          type="text"
          id="post-title"
          name="title"
          placeholder="Enter post title"
        />
        <button type="submit">Create Post</button>
      </form>
    </main>
  </body>
</html>
